name: Draft Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build unsigned Windows artifacts
    runs-on: windows-latest
    timeout-minutes: 35
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read

    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Validate tag and source state
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          if ($package.name -ne "yardrelay-for-bhyve" -or $package.version -notmatch '^\d+\.\d+\.\d+$') {
              throw "package.json does not contain the expected release identity and version."
          }

          $expectedTag = "v$($package.version)"
          if ($env:GITHUB_REF_NAME -cne $expectedTag) {
              throw "Release tag $($env:GITHUB_REF_NAME) does not match package version $expectedTag."
          }

          & git merge-base --is-ancestor $env:GITHUB_SHA origin/main
          if ($LASTEXITCODE -ne 0) {
              throw "Tagged commit $($env:GITHUB_SHA) is not contained in origin/main; refusing to release it."
          }

          "version=$($package.version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install Node dependencies
        run: npm ci

      - name: Validate source and generated files
        shell: pwsh
        run: |
          npm run docs:check
          npm run metadata:check
          npm test
          npm run privacy:scan
          npm audit --audit-level=high
          dotnet restore windows/BHyveControllerApp/BHyveControllerApp.csproj --locked-mode -p:YardRelayFailOnNuGetAudit=true
          dotnet list windows/BHyveControllerApp/BHyveControllerApp.csproj package --vulnerable --include-transitive
          dotnet run --project test/WindowsServerControllerHarness/WindowsServerControllerHarness.csproj
          dotnet run --project test/WindowsDataMigrationHarness/WindowsDataMigrationHarness.csproj

      - name: Build unsigned Windows package and installer
        shell: pwsh
        run: ./windows/package-windows.ps1 -Runtime win-x64 -BuildInstaller

      - name: Generate SPDX SBOM from publish tree
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: outputs/windows/publish/win-x64
          format: spdx-json
          output-file: outputs/windows/YardRelay-${{ steps.version.outputs.version }}-win-x64.spdx.json
          syft-version: v1.44.0
          upload-artifact: false
          upload-release-assets: false

      - name: Write build provenance
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ steps.version.outputs.version }}"
          $outputRoot = Join-Path $PWD "outputs/windows"
          $zipPath = Join-Path $outputRoot "YardRelay-win-x64.zip"
          $installerPath = Join-Path $outputRoot "YardRelaySetup-$version.exe"
          $sbomPath = Join-Path $outputRoot "YardRelay-$version-win-x64.spdx.json"
          $provenancePath = Join-Path $outputRoot "YardRelay-$version-win-x64-provenance.json"

          foreach ($artifactPath in @($zipPath, $installerPath, $sbomPath)) {
              if (-not (Test-Path $artifactPath -PathType Leaf)) {
                  throw "Required release artifact is missing: $artifactPath"
              }
          }

          $sbom = Get-Content $sbomPath -Raw | ConvertFrom-Json
          if (-not $sbom.spdxVersion -or -not $sbom.SPDXID) {
              throw "The generated SBOM is not recognizable SPDX JSON."
          }

          $iscc = Get-Command "iscc.exe" -ErrorAction SilentlyContinue
          $isccPath = if ($iscc) { $iscc.Source } else { $null }
          if (-not $isccPath -and ${env:ProgramFiles(x86)}) {
              $candidate = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6/ISCC.exe"
              if (Test-Path $candidate -PathType Leaf) { $isccPath = $candidate }
          }
          if (-not $isccPath -and $env:ProgramFiles) {
              $candidate = Join-Path $env:ProgramFiles "Inno Setup 6/ISCC.exe"
              if (Test-Path $candidate -PathType Leaf) { $isccPath = $candidate }
          }
          if (-not $isccPath) {
              throw "Inno Setup compiler could not be located for provenance."
          }

          $artifactRecords = foreach ($artifactPath in @($zipPath, $installerPath, $sbomPath)) {
              $file = Get-Item $artifactPath
              [ordered]@{
                  name = $file.Name
                  bytes = $file.Length
                  sha256 = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              }
          }

          $innoVersionInfo = (Get-Item $isccPath).VersionInfo
          $provenance = [ordered]@{
              schemaVersion = 1
              product = [ordered]@{
                  name = "YardRelay"
                  version = $version
                  runtime = "win-x64"
                  unsigned = $true
              }
              source = [ordered]@{
                  repository = $env:GITHUB_REPOSITORY
                  commit = $env:GITHUB_SHA
                  tag = $env:GITHUB_REF_NAME
                  packageLockSha256 = (Get-FileHash "package-lock.json" -Algorithm SHA256).Hash.ToLowerInvariant()
              }
              build = [ordered]@{
                  createdUtc = (Get-Date).ToUniversalTime().ToString("o")
                  workflow = $env:GITHUB_WORKFLOW
                  runId = $env:GITHUB_RUN_ID
                  runAttempt = $env:GITHUB_RUN_ATTEMPT
                  runUrl = "https://github.com/$($env:GITHUB_REPOSITORY)/actions/runs/$($env:GITHUB_RUN_ID)"
              }
              runner = [ordered]@{
                  os = $env:RUNNER_OS
                  architecture = $env:RUNNER_ARCH
                  imageOs = $env:ImageOS
                  imageVersion = $env:ImageVersion
                  platformVersion = [Environment]::OSVersion.VersionString
              }
              tools = [ordered]@{
                  node = (& node --version).Trim()
                  npm = (& npm --version).Trim()
                  dotnetSdk = (& dotnet --version).Trim()
                  dotnetInfo = ((& dotnet --info) -join "`n")
                  powerShell = $PSVersionTable.PSVersion.ToString()
                  innoSetup = if ($innoVersionInfo.ProductVersion) { $innoVersionInfo.ProductVersion } else { $innoVersionInfo.FileVersion }
                  sbomActionCommit = "e22c389904149dbc22b58101806040fa8d37a610"
                  syft = "v1.44.0"
              }
              artifacts = @($artifactRecords)
          }

          $json = $provenance | ConvertTo-Json -Depth 8
          [IO.File]::WriteAllText($provenancePath, "$json`n", [Text.UTF8Encoding]::new($false))

      - name: Generate and verify SHA-256 checksums
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ steps.version.outputs.version }}"
          $outputRoot = Join-Path $PWD "outputs/windows"
          $artifactPaths = @(
              (Join-Path $outputRoot "YardRelay-win-x64.zip"),
              (Join-Path $outputRoot "YardRelaySetup-$version.exe"),
              (Join-Path $outputRoot "YardRelay-$version-win-x64.spdx.json"),
              (Join-Path $outputRoot "YardRelay-$version-win-x64-provenance.json")
          )
          $checksumPath = Join-Path $outputRoot "SHA256SUMS.txt"
          $checksumLines = foreach ($artifactPath in $artifactPaths) {
              if (-not (Test-Path $artifactPath -PathType Leaf)) {
                  throw "Cannot checksum missing artifact: $artifactPath"
              }
              $hash = (Get-FileHash $artifactPath -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash  $([IO.Path]::GetFileName($artifactPath))"
          }
          [IO.File]::WriteAllLines($checksumPath, $checksumLines, [Text.UTF8Encoding]::new($false))

          foreach ($line in Get-Content $checksumPath) {
              if ($line -notmatch '^([0-9a-f]{64})  (.+)$') {
                  throw "Malformed checksum line: $line"
              }
              $actual = (Get-FileHash (Join-Path $outputRoot $Matches[2]) -Algorithm SHA256).Hash.ToLowerInvariant()
              if ($actual -cne $Matches[1]) {
                  throw "Checksum verification failed for $($Matches[2])."
              }
          }

      - name: Transfer verified release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-${{ steps.version.outputs.version }}
          path: |
            outputs/windows/YardRelay-win-x64.zip
            outputs/windows/YardRelaySetup-${{ steps.version.outputs.version }}.exe
            outputs/windows/YardRelay-${{ steps.version.outputs.version }}-win-x64.spdx.json
            outputs/windows/YardRelay-${{ steps.version.outputs.version }}-win-x64-provenance.json
            outputs/windows/SHA256SUMS.txt
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  release:
    name: Create draft GitHub release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download verified release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets-${{ needs.build.outputs.version }}
          path: release-assets

      - name: Verify transferred checksums
        working-directory: release-assets
        run: sha256sum --check SHA256SUMS.txt

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          expected_tag="v${RELEASE_VERSION}"
          if [[ "${RELEASE_TAG}" != "${expected_tag}" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match transferred version ${expected_tag}." >&2
            exit 1
          fi

          release_tags="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases" --jq '.[].tag_name')"
          if grep -Fqx -- "${RELEASE_TAG}" <<<"${release_tags}"; then
            echo "A release already exists for ${RELEASE_TAG}; refusing to mutate or replace it." >&2
            exit 1
          fi

          assets=(
            "release-assets/YardRelay-win-x64.zip"
            "release-assets/YardRelaySetup-${RELEASE_VERSION}.exe"
            "release-assets/YardRelay-${RELEASE_VERSION}-win-x64.spdx.json"
            "release-assets/YardRelay-${RELEASE_VERSION}-win-x64-provenance.json"
            "release-assets/SHA256SUMS.txt"
          )
          notes=$'This is an unsigned beta build. Windows may display SmartScreen warnings.\n\nReview the installer and ZIP, SHA-256 checksums, SPDX SBOM, and build provenance before publishing this draft.'

          gh release create "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --draft \
            --prerelease \
            --title "YardRelay ${RELEASE_TAG} - unsigned beta" \
            --notes "${notes}" \
            "${assets[@]}"
